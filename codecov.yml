# Coverage reporting configuration.
#
# The bot's Discord I/O boundaries (real HTTP calls in `execute_ban` and the
# gateway event handlers) cannot be exercised without a live connection, so
# coverage targets are informational: they are reported on the PR but never
# block merging. Pure logic (detection predicates, formatting, the dedup
# guard) is unit-tested directly.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment:
  require_changes: false

# `interaction.rs` is entirely a Discord HTTP boundary (button interaction
# handling: unban calls and interaction responses), so none of it can be
# exercised without a live connection. Its only pure logic — parsing the unban
# button `custom_id` — lives in and is unit-tested from `ban.rs`. Excluding it
# keeps the coverage signal meaningful. `ban.rs`/`handler.rs` are NOT ignored
# because they still contain testable pure logic alongside their I/O.
ignore:
  - "src/discord/interaction.rs"
